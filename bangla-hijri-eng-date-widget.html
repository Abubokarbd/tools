<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>সঠিক তারিখ উইজেট</title>
  
  <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
  
  <style>
    body {
      font-family: 'SolaimanLipi', Arial, sans-serif;
      margin: 0; padding: 0;
      background-color: transparent;
      text-align: center;
      color: #000000;
    }
    .widget-container {
      display: inline-block;
      padding: 15px;
    }
    #fullDate {
      font-size: 1.15em;
      font-weight: bold;
      display: block;
      line-height: 1.6em;
      margin-bottom: 8px;
    }
    .underline {
      height: 2px;
      background: linear-gradient(to right, transparent, #000000, transparent);
      width: 95%;
      margin: 0 auto;
      border-radius: 2px;
      opacity: 0.3;
    }
    .info-box {
      margin-top: 10px;
    }
    .ayyam-title {
      font-size: 1.05em;
      color: #333;
      display: block;
      font-weight: bold;
      margin-bottom: 3px;
    }
    .ayyam-dates {
      font-size: 1.1em;
      color: #000;
      display: block;
      font-weight: bold;
    }
    #linkIcon a {
      text-decoration: none;
      font-size: 0.9em;
      margin-left: 8px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="widget-container">
    <div id="fullDate">তারিখ লোড হচ্ছে...</div>
    <div class="underline"></div> 
    
    <div class="info-box">
      <span class="ayyam-title">আইয়ামে বীজের রোজা:</span>
      <span id="ayyamDates" class="ayyam-dates">হিসাব করা হচ্ছে...</span>
    </div>
  </div>

  <script>
    const toBn = n => n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]);
    const months = ['জানুয়ারি', 'ফেব্রুয়ারি', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগস্ট', 'সেপ্টেম্বর', 'অক্টোবর', 'নভেম্বর', 'ডিসেম্বর'];

    // হিজরি ক্যালকুলেটর
    function calculateHijri(date, adj) {
      let jd = Math.floor(date.getTime() / 86400000) + 2440588 + adj;
      let l = jd - 1948440 + 10632;
      let n = Math.floor((l - 1) / 10631);
      l = l - 10631 * n + 354;
      let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
      l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
      let m = Math.floor((24 * l) / 709);
      let d = l - Math.floor((709 * m) / 24);
      let y = 30 * n + j - 30;
      return { day: d, month: m, year: y };
    }

    // বঙ্গাব্দ ক্যালকুলেটর (বাংলাদেশি সংশোধিত নিয়ম - ১০০% নির্ভুল)
    function getBongabdo(date) {
      let d = date.getDate();
      let m = date.getMonth(); // 0 = Jan, 2 = Mar
      let y = date.getFullYear();
      let bDay, bMonth, bYear;
      
      bYear = (m < 3 || (m === 3 && d < 14)) ? y - 594 : y - 593;
      const isLeapYear = (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);

      // মাস অনুযায়ী দিন এবং নাম নির্ধারণ
      if (m === 3) { // এপ্রিল
          if (d >= 14) { bMonth = 'বৈশাখ'; bDay = d - 13; } else { bMonth = 'চৈত্র'; bDay = d + 17; }
      } else if (m === 4) { // মে
          if (d >= 15) { bMonth = 'জ্যৈষ্ঠ'; bDay = d - 14; } else { bMonth = 'বৈশাখ'; bDay = d + 17; }
      } else if (m === 5) { // জুন
          if (d >= 16) { bMonth = 'আষাঢ়'; bDay = d - 15; } else { bMonth = 'জ্যৈষ্ঠ'; bDay = d + 16; }
      } else if (m === 6) { // জুলাই
          if (d >= 17) { bMonth = 'শ্রাবণ'; bDay = d - 16; } else { bMonth = 'আষাঢ়'; bDay = d + 15; }
      } else if (m === 7) { // আগস্ট
          if (d >= 17) { bMonth = 'ভাদ্র'; bDay = d - 16; } else { bMonth = 'শ্রাবণ'; bDay = d + 15; }
      } else if (m === 8) { // সেপ্টেম্বর
          if (d >= 17) { bMonth = 'আশ্বিন'; bDay = d - 16; } else { bMonth = 'ভাদ্র'; bDay = d + 15; }
      } else if (m === 9) { // অক্টোবর
          if (d >= 17) { bMonth = 'কার্তিক'; bDay = d - 16; } else { bMonth = 'আশ্বিন'; bDay = d + 14; }
      } else if (m === 10) { // নভেম্বর
          if (d >= 16) { bMonth = 'অগ্রহায়ণ'; bDay = d - 15; } else { bMonth = 'কার্তিক'; bDay = d + 15; }
      } else if (m === 11) { // ডিসেম্বর
          if (d >= 16) { bMonth = 'পৌষ'; bDay = d - 15; } else { bMonth = 'অগ্রহায়ণ'; bDay = d + 15; }
      } else if (m === 0) { // জানুয়ারি
          if (d >= 15) { bMonth = 'মাঘ'; bDay = d - 14; } else { bMonth = 'পৌষ'; bDay = d + 16; }
      } else if (m === 1) { // ফেব্রুয়ারি
          if (d >= 14) { bMonth = 'ফাল্গুন'; bDay = d - 13; } else { bMonth = 'মাঘ'; bDay = d + 16; }
      } else if (m === 2) { // মার্চ
          // মার্চ মাসের ১৩ তারিখ পর্যন্ত ফাল্গুন (১৪ ফাল্গুন থেকে চৈত্র শুরু)
          if (d >= 15) { bMonth = 'চৈত্র'; bDay = d - 14; } 
          else { bMonth = 'ফাল্গুন'; bDay = d + (isLeapYear ? 15 : 14); }
      }

      return `${toBn(bDay)} ${bMonth} ${toBn(bYear)} বঙ্গাব্দ`;
    }

    function getFullDate() {
      const now = new Date();
      const adjustment = -1;

      const days = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
      const currentMonthBn = months[now.getMonth()];
      const engStr = `${days[now.getDay()]}, ${toBn(now.getDate())} ${currentMonthBn} ${toBn(now.getFullYear())} খ্রিস্টাব্দ`;

      const hData = calculateHijri(now, adjustment);
      const hMonths = ["মুহাররম", "সফর", "রবিউল আউয়াল", "রবিউস সানি", "জমাদিউল আউয়াল", "জমাদিউস সানি", "রজব", "শাবান", "রমজান", "শাওয়াল", "জিলক্বদ", "জিলহজ্জ"];
      const hijriStr = `${toBn(hData.day)} ${hMonths[hData.month - 1]} ${toBn(hData.year)} হিজরি`;

      // আইয়ামে বীজ লজিক
      let ayyamList = [];
      for (let i = -15; i < 25; i++) {
        let checkDate = new Date();
        checkDate.setDate(now.getDate() + i);
        let h = calculateHijri(checkDate, adjustment);
        if (h.month === hData.month && h.year === hData.year) {
          if (h.day === 13 || h.day === 14 || h.day === 15) {
            ayyamList.push({ day: toBn(checkDate.getDate()), month: months[checkDate.getMonth()] });
          }
        }
      }

      let finalAyyamText = "";
      if (ayyamList.length > 0) {
        if (ayyamList[0].month === ayyamList[ayyamList.length - 1].month) {
          finalAyyamText = `${ayyamList.map(item => item.day).join(', ')} ${ayyamList[0].month}`;
        } else {
          finalAyyamText = ayyamList.map(item => `${item.day} ${item.month}`).join(', ');
        }
      }

      const icon = `<span id="linkIcon"><a href="https://abubokar.blogspot.com/" target="_blank">🌐</a></span>`;
      document.getElementById('fullDate').innerHTML = `${hijriStr} | ${getBongabdo(now)} | ${engStr} ${icon}`;
      document.getElementById('ayyamDates').innerText = finalAyyamText;
    }

    getFullDate();
    setInterval(getFullDate, 3600000);
  </script>
</body>
</html>
